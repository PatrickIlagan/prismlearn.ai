name: Keep backend awake

# Render's free tier spins the backend down after ~15 min idle; the request
# that wakes it (and anything racing right behind it, e.g. the dashboard's
# parallel per-workspace reviewer fetches) can fail while it's still coming
# up. Pinging a lightweight health endpoint every 10 minutes keeps it under
# that threshold so it never actually goes to sleep.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -sf --max-time 30 https://prismlearn-backend.onrender.com/health
